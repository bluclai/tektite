<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tektite</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #131314;
      }

      #app-loading {
        position: fixed;
        inset: 0;
        background: #131314;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        z-index: 9999;
        font-family: "Inter Variable", "Inter", system-ui, sans-serif;
      }

      #app-loading .wordmark {
        font-size: 1.75rem;
        font-weight: 300;
        letter-spacing: -0.04em;
        user-select: none;
        animation: tk-fade-in 300ms ease-out forwards;
      }

      #app-loading .wordmark-tek {
        color: #e8e8ea;
      }
      #app-loading .wordmark-tite {
        color: #bdc2ff;
      }

      #app-loading .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #bdc2ff;
        animation:
          tk-fade-in 300ms ease-out 80ms both,
          tk-pulse 2s ease-out 400ms infinite;
      }

      @keyframes tk-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes tk-pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(189, 194, 255, 0.35);
        }
        60% {
          box-shadow: 0 0 0 12px rgba(189, 194, 255, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(189, 194, 255, 0);
        }
      }

      #app-loading.hidden {
        opacity: 0;
        transition: opacity 200ms ease-out;
        pointer-events: none;
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="app-loading" aria-hidden="true">
      <div class="wordmark">
        <span class="wordmark-tek">tek</span><span class="wordmark-tite">tite</span>
      </div>
      <div class="dot"></div>
    </div>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
